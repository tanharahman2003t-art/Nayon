<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Master</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6c63ff, #8f94fb);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #6c63ff;
        }

        .btn {
            background: #6c63ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.3);
        }

        .btn:hover {
            background: #5a52e0;
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
        }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="logo-icon">🚀</span>
        <h2>Welcome!</h2>
        <p>Enter your name to start the quiz</p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Enter your full name" required>
            <button type="submit" class="btn">Start Journey</button>
        </form>
    </div>

</body>
</html>
