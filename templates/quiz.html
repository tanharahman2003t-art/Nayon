<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro | Ultra Animated</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #ff4757;
            --success: #00d2d3;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* --- Animations --- */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 211, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 210, 211, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 211, 0); }
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute; width: 400px; height: 400px;
            background: linear-gradient(45deg, var(--primary), #4834d4);
            filter: blur(100px); border-radius: 50%; z-index: -1; opacity: 0.3;
            animation: float 20s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(20%, 20%) rotate(360deg); }
        }

        .container {
            width: 90%; max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        /* Progress Bar with Glow */
        .timer-track {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px 0; overflow: hidden;
        }
        .timer-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #6c63ff, #00d2d3);
            box-shadow: 0 0 15px var(--primary);
            transition: width 1s linear;
        }

        /* Lifeline Buttons */
        .lifelines { display: flex; gap: 12px; margin-bottom: 25px; }
        .life-btn {
            flex: 1; padding: 12px; border: none; border-radius: 15px;
            background: rgba(255, 255, 255, 0.1); color: var(--text);
            font-weight: 600; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .life-btn:hover:not(:disabled) { 
            background: var(--primary); transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        /* Question & Options */
        h3 { font-size: 22px; margin-bottom: 25px; line-height: 1.4; font-weight: 700; }

        .option {
            padding: 16px 20px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent; border-radius: 18px;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--primary);
        }

        /* Result States */
        .option.correct-anim {
            background: var(--success) !important;
            color: #000 !important;
            animation: pulse-green 0.5s infinite;
            border-color: white !important;
        }

        .option.wrong-anim {
            background: var(--secondary) !important;
            color: #fff !important;
            animation: shake 0.4s ease-in-out;
        }

        #audio-unlock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            color: white; cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div id="audio-unlock" onclick="startQuizEngine()">
        <div>
            <h1 style="font-size: 50px;">🎮</h1>
            <p>Tap to Initialize Engine<br>(Sound & Vibration)</p>
        </div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; font-size: 14px; opacity: 0.8;">
            <span>QUESTION {{ step }}/{{ total }}</span>
            <span id="time-text">15s</span>
        </div>
        
        <div class="timer-track">
            <div class="timer-bar" id="progressBar"></div>
        </div>

        <div class="lifelines">
            <button id="fiftyBtn" class="life-btn" onclick="useFifty()">✂️ 50-50</button>
            <button id="skipBtn" class="life-btn" onclick="useSkip()">⏭️ Skip</button>
        </div>

        <h3>{{ question.question }}</h3>

        <form id="quizForm" method="POST">
            <div id="options-list">
                {% for option in options %}
                <div class="option" onclick="handleAnswer(this, `{{ option }}`)">
                    {{ option }}
                </div>
                {% endfor %}
            </div>
            <input type="hidden" name="answer" id="answerInput">
        </form>
    </div>

    <audio id="snd_win" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>
    <audio id="snd_lose" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        const correctAns = `{{ question.answer }}`;
        let timeLeft = 15;
        let active = false;

        // Dark Mode Check
        if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        function startQuizEngine() {
            document.getElementById('audio-unlock').style.display = 'none';
            document.getElementById('snd_win').play(); document.getElementById('snd_win').pause();
            document.getElementById('snd_lose').play(); document.getElementById('snd_lose').pause();
            active = true;
            if(navigator.vibrate) navigator.vibrate(50);
        }

        const timerLoop = setInterval(() => {
            if(active) {
                timeLeft--;
                document.getElementById('time-text').innerText = timeLeft + "s";
                document.getElementById('progressBar').style.width = (timeLeft / 15 * 100) + "%";
                if(timeLeft <= 0) { clearInterval(timerLoop); finalSubmit("TIMEOUT"); }
            }
        }, 1000);

        function handleAnswer(el, val) {
            if(!active || el.classList.contains('locked')) return;
            active = false; // Stop timer
            
            // Lock all options
            document.querySelectorAll('.option').forEach(opt => opt.classList.add('locked'));

            if (val.trim() === correctAns.trim()) {
                el.classList.add('correct-anim');
                document.getElementById('snd_win').play();
                if(navigator.vibrate) navigator.vibrate(100);
            } else {
                el.classList.add('wrong-anim');
                document.getElementById('snd_lose').play();
                if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                
                // Show correct one
                document.querySelectorAll('.option').forEach(opt => {
                    if(opt.innerText.trim() === correctAns.trim()) opt.classList.add('correct-anim');
                });
            }

            setTimeout(() => finalSubmit(val), 1500);
        }

        function useFifty() {
            let options = Array.from(document.querySelectorAll('.option'));
            let count = 0;
            options.forEach(opt => {
                if(opt.innerText.trim() !== correctAns.trim() && count < 2) {
                    opt.style.opacity = '0';
                    opt.style.pointerEvents = 'none';
                    count++;
                }
            });
            document.getElementById('fiftyBtn').disabled = true;
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function useSkip() {
            finalSubmit("SKIPPED");
        }

        function finalSubmit(val) {
            document.getElementById('answerInput').value = val;
            document.getElementById('quizForm').submit();
        }
    </script>
</body>
</html>
