<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h2>Question {{ qno + 1 }}</h2>

<form method="POST">
    <h3>{{ question["question"] }}</h3>

    {% for option in question["options"] %}
        <div>
            <input type="radio" name="answer" value="{{ option }}" required>
            {{ option }}
        </div>
    {% endfor %}

    <br>
    <button type="submit">Next</button>
</form>

</body>
</html>
