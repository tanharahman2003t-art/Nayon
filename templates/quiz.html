<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
    margin: 0;
}

/* Header */
.header {
    padding: 15px;
    font-weight: bold;
    font-size: 20px;
}

/* Container */
.container {
    padding: 20px;
}

/* Top row */
.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.badge {
    background: #e3e6ff;
    padding: 5px 12px;
    border-radius: 20px;
    color: #6c63ff;
}

/* Progress bar */
.progress {
    height: 6px;
    background: #ddd;
    border-radius: 10px;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: {{ progress }}%;
    background: #6c63ff;
    border-radius: 10px;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Question */
.question {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* Options */
.option {
    display: flex;
    align-items: center;
    padding: 15px;
    margin-bottom: 12px;
    border: 2px solid #eee;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    border-color: #6c63ff;
}

/* SELECT EFFECT */
.option input:checked + .circle {
    border-color: #6c63ff;
}

.option input:checked ~ span {
    font-weight: bold;
}

.option input:checked {
    accent-color: #6c63ff;
}

.option.selected {
    border-color: #6c63ff;
    background: #f0f2ff;
}

/* Circle */
.circle {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    font-weight: bold;
}

/* Button */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    Quiz Master | developed by Nayon
</div>

<div class="container">

    <div class="top">
        <div class="badge">{{ question.category }}</div>
        <div>{{ qno + 1 }} / {{ total }}</div>
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="card">
        <div class="question">
            {{ question.question }}
        </div>

        <form method="POST" id="quizForm">

            {% for option in question.options %}
            <label class="option">
                <input type="radio" name="answer" value="{{ option }}" required>

                <div class="circle">
                    {{ ['A','B','C','D'][loop.index0] }}
                </div>

                <span>{{ option }}</span>
            </label>
            {% endfor %}

            <button type="submit">Next Question</button>

        </form>
    </div>

</div>

<script>
// highlight selected option
document.querySelectorAll(".option").forEach(opt => {
    opt.addEventListener("click", () => {
        document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
    });
});
</script>

</body>
</html>
