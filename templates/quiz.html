<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    margin: 0;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
}

.option {
    padding: 15px;
    margin-bottom: 10px;
    border: 2px solid #eee;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    border-color: #28a745;
}

/* Correct */
.correct {
    background: #e6ffe6;
    border-color: #28a745;
}

/* Wrong */
.wrong {
    background: #ffe6e6;
    border-color: red;
}
</style>
</head>

<body>

<div class="container">

<h3>{{ question.question }}</h3>

<form id="quizForm" method="POST">

{% for option in options %}
<div class="option" onclick="selectAnswer(this, `{{ option }}`)">
    {{ option }}
</div>
{% endfor %}

<input type="hidden" name="answer" id="answerInput">

</form>

</div>

<script>

// ✅ FIX: use correct answer directly
const correct = `{{ question.answer }}`;

function selectAnswer(el, value) {

    document.getElementById("answerInput").value = value;

    const options = document.querySelectorAll(".option");

    // disable clicks
    options.forEach(opt => opt.style.pointerEvents = "none");

    if (value.trim() === correct.trim()) {
        el.classList.add("correct");   // GREEN
    } else {
        el.classList.add("wrong");     // RED

        // highlight correct
        options.forEach(opt => {
            if (opt.innerText.trim() === correct.trim()) {
                opt.classList.add("correct");
            }
        });
    }

    setTimeout(() => {
        document.getElementById("quizForm").submit();
    }, 800);
}
</script>

</body>
</html>
