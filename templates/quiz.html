<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
<style>
body { font-family: Arial; background:#f4f6fb; display:flex; justify-content:center; align-items:center; height:100vh; }

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    width:400px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.progress {
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-bottom:15px;
}
.progress-bar {
    height:100%;
    background:#6c63ff;
    width:{{ progress }}%;
    border-radius:10px;
}

.timer {
    color:red;
    font-weight:bold;
    margin-bottom:10px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    background:#6c63ff;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="timer">Time left: <span id="time">10</span>s</div>

    <h3>Question {{ qno + 1 }} / {{ total }}</h3>
    <p>{{ question.question }}</p>

    <form method="POST" id="quizForm">
        {% for option in question.options %}
            <div>
                <input type="radio" name="answer" value="{{ option }}" required> {{ option }}
            </div>
        {% endfor %}

        <button type="submit">Next</button>
    </form>
</div>

<script>
let time = 10;
let timer = document.getElementById("time");

let interval = setInterval(() => {
    time--;
    timer.innerText = time;

    if(time <= 0){
        clearInterval(interval);
        document.getElementById("quizForm").submit();
    }
}, 1000);
</script>

</body>
</html>
