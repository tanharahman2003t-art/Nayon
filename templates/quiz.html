<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
    margin: 0;
}

/* Header */
.header {
    padding: 15px;
    font-weight: bold;
    font-size: 20px;
}

/* Container */
.container {
    padding: 20px;
}

/* Top row */
.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.badge {
    background: #e3e6ff;
    padding: 5px 12px;
    border-radius: 20px;
    color: #6c63ff;
}

/* Progress bar */
.progress {
    height: 6px;
    background: #ddd;
    border-radius: 10px;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: {{ progress }}%;
    background: #6c63ff;
    border-radius: 10px;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Question */
.question {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* Options */
.option {
    display: flex;
    align-items: center;
    padding: 15px;
    margin-bottom: 12px;
    border: 2px solid #eee;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    border-color: #6c63ff;
}

/* circle */
.circle {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    font-weight: bold;
}

/* Correct / Wrong */
.correct {
    background: #d4edda;
    border-color: green !important;
}

.wrong {
    background: #f8d7da;
    border-color: red !important;
}

/* Button hidden */
button {
    display: none;
}
</style>
</head>

<body>

<div class="header">
    Quiz Master | developed by Nayon
</div>

<div class="container">

    <div class="top">
        <div class="badge">{{ question.category }}</div>
        <div>{{ qno + 1 }} / {{ total }}</div>
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="card">
        <div class="question">
            {{ question.question }}
        </div>

        <form method="POST" id="quizForm">
            {% for option in question.options %}
            <label class="option" onclick="selectOption(this, '{{ option }}', '{{ question.answer }}')">
                <input type="radio" name="answer" value="{{ option }}" hidden>
                
                <div class="circle">
                    {{ ['A','B','C','D'][loop.index0] }}
                </div>

                {{ option }}
            </label>
            {% endfor %}

            <button type="submit" id="submitBtn">Next</button>
        </form>
    </div>

</div>

<script>
function selectOption(element, selected, correct) {

    // disable multiple click
    let options = document.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = "none");

    // check answer
    if(selected === correct){
        element.classList.add("correct");
    } else {
        element.classList.add("wrong");

        // correct option highlight
        options.forEach(opt => {
            if(opt.innerText.trim().includes(correct)){
                opt.classList.add("correct");
            }
        });
    }

    // auto next after 1 sec
    setTimeout(() => {
        document.getElementById("submitBtn").click();
    }, 1000);
}
</script>

</body>
</html>
