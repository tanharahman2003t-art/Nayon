<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Sound Fixed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #6c63ff, #8f94fb); margin: 0; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .timer-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .timer-bar { height: 100%; background: #ff4757; width: 100%; transition: width 1s linear; }
        .info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: #666; }
        .lifelines { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .life-btn { background: #ff9f43; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .option { padding: 15px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.3s; background: white; }
        .option:hover { border-color: #6c63ff; background: #f9f9ff; }
        .correct { background: #e6ffe6 !important; border-color: #28a745 !important; }
        .wrong { background: #ffe6e6 !important; border-color: #ff4757 !important; }
        .hidden-option { visibility: hidden; pointer-events: none; }
    </style>
</head>
<body onclick="unlockAudio()"> <audio id="snd_correct" preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/button-37.mp3" type="audio/mpeg">
</audio>
<audio id="snd_wrong" preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/button-10.mp3" type="audio/mpeg">
</audio>
<audio id="snd_tick" preload="auto">
    <source src="https://www.soundjay.com/clock/sounds/clock-ticking-2.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="info">
        <span>Question {{ step }}/{{ total }}</span>
        <span id="timerText">⏱️ 15s</span>
    </div>
    <div class="timer-container"><div class="timer-bar" id="progressBar"></div></div>

    <div class="lifelines">
        <button id="fiftyBtn" class="life-btn" onclick="useFiftyFifty()">✂️ 50-50</button>
        <button id="skipBtn" class="life-btn" onclick="useSkip()">⏭️ Skip</button>
    </div>

    <h3 id="q_text">{{ question.question }}</h3>

    <form id="quizForm" method="POST">
        <div id="optionsContainer">
            {% for option in options %}
            <div class="option" onclick="selectAnswer(this, `{{ option }}`)">{{ option }}</div>
            {% endfor %}
        </div>
        <input type="hidden" name="answer" id="answerInput">
    </form>
</div>

<script>
    const correctAns = `{{ question.answer }}`;
    let timeLeft = 15;
    let isPaused = false;

    // Audio Elements
    const sCorrect = document.getElementById("snd_correct");
    const sWrong = document.getElementById("snd_wrong");
    const sTick = document.getElementById("snd_tick");

    // Audio Unlocker: Chrome/Safari require interaction
    function unlockAudio() {
        sCorrect.play(); sCorrect.pause();
        sWrong.play(); sWrong.pause();
        sTick.play(); sTick.pause();
    }

    const timer = setInterval(() => {
        if(!isPaused) {
            timeLeft--;
            document.getElementById("timerText").innerText = `⏱️ ${timeLeft}s`;
            document.getElementById("progressBar").style.width = (timeLeft / 15 * 100) + "%";
            
            if(timeLeft <= 3 && timeLeft > 0) {
                sTick.currentTime = 0;
                sTick.play().catch(e => {}); 
            }

            if (timeLeft <= 0) {
                clearInterval(timer);
                submitForm("TIMEOUT");
            }
        }
    }, 1000);

    function selectAnswer(el, val) {
        if(isPaused) return;
        isPaused = true; 
        
        const options = document.querySelectorAll(".option");
        options.forEach(opt => opt.style.pointerEvents = "none");

        if (val.trim() === correctAns.trim()) {
            sCorrect.currentTime = 0;
            sCorrect.play().catch(e => console.log("Blocked"));
            el.classList.add("correct");
        } else {
            sWrong.currentTime = 0;
            sWrong.play().catch(e => console.log("Blocked"));
            el.classList.add("wrong");
            options.forEach(opt => {
                if(opt.innerText.trim() === correctAns.trim()) opt.classList.add("correct");
            });
        }
        
        setTimeout(() => submitForm(val), 1200);
    }

    function useFiftyFifty() {
        const options = Array.from(document.querySelectorAll(".option"));
        let count = 0;
        options.forEach(opt => {
            if (opt.innerText.trim() !== correctAns.trim() && count < 2) {
                opt.classList.add("hidden-option");
                count++;
            }
        });
        document.getElementById("fiftyBtn").disabled = true;
        document.getElementById("fiftyBtn").style.opacity = "0.5";
    }

    function useSkip() {
        submitForm("SKIPPED");
    }

    function submitForm(val) {
        document.getElementById("answerInput").value = val;
        document.getElementById("quizForm").submit();
    }
</script>
</body>
</html>
