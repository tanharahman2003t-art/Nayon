<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro</title>
    <style>
        :root { --primary: #6c63ff; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-bar { height: 5px; background: var(--primary); width: 100%; transition: 1s linear; margin-bottom: 20px; }
        .option { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .option:hover { border-color: var(--primary); background: rgba(108, 99, 255, 0.2); }
        .correct { background: #00d2d3 !important; color: black; font-weight: bold; }
        .wrong { background: #ff4757 !important; }
        .life-btn { background: #4834d4; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .life-btn:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div id="progress" class="timer-bar"></div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px;">
            <span>Q: {{ step }}/{{ total }}</span>
            <span id="timer-text">10s</span>
        </div>
        <button id="fiftyBtn" class="life-btn" onclick="useFifty()">✂️ 50:50 (Left: <span id="lCount">{{ lifelines }}</span>)</button>
        <h3>{{ question.question }}</h3>
        <div id="options-container">
            {% for opt in options %}
            <div class="option" onclick="handleAnswer(this, `{{ opt }}`)">{{ opt }}</div>
            {% endfor %}
        </div>
        <form id="quizForm" method="POST"><input type="hidden" name="answer" id="ansInput"></form>
    </div>

    <script>
        const correctAns = `{{ question.answer | safe }}`; // 'safe' ফিল্টার স্পেশাল ক্যারেক্টার ঠিক রাখে
        let timeLeft = 10;
        let isAnswered = false;

        const tInterval = setInterval(() => {
            if(!isAnswered) {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft + "s";
                document.getElementById('progress').style.width = (timeLeft/10*100) + "%";
                if(timeLeft <= 0) { clearInterval(tInterval); submit("TIMEOUT"); }
            }
        }, 1000);

        function handleAnswer(el, val) {
            if(isAnswered) return;
            isAnswered = true;
            if(val.trim() === correctAns.trim()) {
                el.classList.add('correct');
            } else {
                el.classList.add('wrong');
                document.querySelectorAll('.option').forEach(o => {
                    if(o.innerText.trim() === correctAns.trim()) o.classList.add('correct');
                });
            }
            setTimeout(() => submit(val), 800);
        }

        async function useFifty() {
            let res = await fetch('/quiz', {method: 'POST', body: new URLSearchParams({'answer': 'USE_FIFTY'})});
            let data = await res.json();
            if(data.status === "ok") {
                document.getElementById('lCount').innerText = data.remaining;
                document.getElementById('fiftyBtn').disabled = true;
                let hidden = 0;
                document.querySelectorAll('.option').forEach(o => {
                    if(o.innerText.trim() !== correctAns.trim() && hidden < 2) {
                        o.style.visibility = 'hidden'; hidden++;
                    }
                });
            }
        }

        function submit(val) {
            document.getElementById('ansInput').value = val;
            document.getElementById('quizForm').submit();
        }
    </script>
</body>
</html>
