<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #6c63ff, #8f94fb); margin: 0; }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        h2 { text-align: center; color: white; margin-bottom: 20px; }
        .board { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .row:last-child { border: none; }
        .rank { font-weight: bold; width: 35px; color: #6c63ff; }
        .name { flex: 1; text-align: left; font-weight: 500; }
        .score { font-weight: bold; background: #f0f0ff; padding: 5px 12px; border-radius: 15px; color: #6c63ff; }
        .top-row { background: #fff9e6; border-radius: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏆 Hall of Fame</h2>
    <div class="board">
        {% for user in data %}
        <div class="row {% if loop.index == 1 %}top-row{% endif %}">
            <span class="rank">#{{ loop.index }}</span>
            <span class="name">{{ user.name }}</span>
            <span class="score">{{ user.score }} pts</span>
        </div>
        {% endfor %}
    </div>
    <a href="/" style="display:block; text-align:center; margin-top:20px; color:white; text-decoration:none; font-weight:bold;">⬅ Back to Home</a>
</div>
</body>
</html>
