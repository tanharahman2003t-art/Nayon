<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Home</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fb; text-align: center; margin: 0; }
        .container { padding: 50px 20px; max-width: 600px; margin: auto; }
        .badge { background: #dcdcff; color: #6c63ff; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        h1 { color: #333; font-size: 32px; }
        .user-welcome { color: #6c63ff; font-weight: bold; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card h2 { color: #6c63ff; margin: 5px 0; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #6c63ff; color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #5a52e0; transform: translateY(-2px); }
        .btn-alt { background: white; color: #6c63ff; border: 2px solid #6c63ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">QUIZ MASTER v2.0</div>
        <h1>Welcome, <span class="user-welcome">{{ username }}</span>!</h1>
        <p>You have 15 seconds for each question. Good luck!</p>

        <div class="cards">
            <div class="card"><h2>{{ total }}</h2><p>Items</p></div>
            <div class="card"><h2>15s</h2><p>Timer</p></div>
            <div class="card"><h2>Live</h2><p>Rank</p></div>
        </div>

        <div class="btn-group">
            <a href="/start" class="btn">🚀 Start Quiz Now</a>
            <a href="/leaderboard" class="btn btn-alt">🏆 View Leaderboard</a>
            <a href="/logout" style="margin-top:20px; color:#999; text-decoration:none;">Logout</a>
        </div>
    </div>
</body>
</html>
