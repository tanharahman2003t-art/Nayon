<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 30px;
    border-radius: 25px;
    width: 350px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

/* Title */
h2 {
    margin-bottom: 10px;
}

/* Circle */
.circle {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 20px auto;
}

svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
}

.bg {
    stroke: #eee;
}

.progress {
    stroke: #6c63ff;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    animation: progressAnim 1.5s ease forwards;
}

@keyframes progressAnim {
    to {
        stroke-dashoffset: calc(440 - (440 * {{ percentage }} / 100));
    }
}

/* Percentage text */
.percent {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px;
    font-weight: bold;
    color: #333;
}

/* Score text */
.score {
    font-size: 18px;
    color: #666;
}

/* Dynamic message */
.message {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

/* Button */
button {
    margin-top: 20px;
    padding: 14px 25px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">

    <h2>🎯 Your Result</h2>

    <div class="circle">
        <svg>
            <circle class="bg" cx="70" cy="70" r="60"></circle>
            <circle class="progress" cx="70" cy="70" r="60"></circle>
        </svg>
        <div class="percent">{{ percentage }}%</div>
    </div>

    <div class="score">
        {{ score }} out of {{ total }} correct
    </div>

    <!-- Dynamic Message -->
    <div class="message">
        {% if percentage >= 80 %}
            🔥 Excellent! You are a genius!
        {% elif percentage >= 50 %}
            👏 Good job! Keep improving!
        {% else %}
            💡 Keep practicing! You can do better!
        {% endif %}
    </div>

    <a href="/start">
        <button>Play Again</button>
    </a>

</div>

</body>
</html>
