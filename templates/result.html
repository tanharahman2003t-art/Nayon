<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #6c63ff, #8f94fb); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 35px; border-radius: 30px; width: 340px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .score-circle { font-size: 50px; font-weight: bold; color: #6c63ff; margin: 15px 0; }
        .rank-tag { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-decoration: none; box-sizing: border-box; font-size: 16px; }
        .btn-submit { background: #6c63ff; color: white; }
        .btn-retry { background: #eee; color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>🎯 Scorecard</h2>
    <div class="score-circle">{{ percentage }}%</div>
    <div class="rank-tag">
        {% if percentage >= 80 %}🏆 Master
        {% elif percentage >= 50 %}👍 Pro
        {% else %}🐣 Beginner
        {% endif %}
    </div>
    <p>Correct: <b>{{ score }}</b> / {{ total }}</p>
    
    <form method="POST">
        <button type="submit" class="btn btn-submit">Save to Leaderboard 🚀</button>
    </form>
    <a href="/start" class="btn btn-retry">Play Again</a>
</div>
</body>
</html>
