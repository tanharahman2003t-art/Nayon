<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 30px;
    border-radius: 25px;
    width: 350px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Circle */
.circle {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 20px auto;
}

svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
}

.bg { stroke: #eee; }

.progress {
    stroke: #6c63ff;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    animation: progressAnim 1.5s ease forwards;
}

@keyframes progressAnim {
    to {
        stroke-dashoffset: calc(440 - (440 * {{ percentage }} / 100));
    }
}

/* Percent */
.percent {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px;
    font-weight: bold;
}

/* Rank */
.rank {
    font-size: 22px;
    font-weight: bold;
}

/* Score */
.score {
    color: #666;
}

/* Input */
input {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* Button */
.btn {
    margin-top: 15px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c63ff, #8f94fb);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.btn2 {
    background: #eee;
    color: #333;
}
</style>
</head>

<body>

<div class="card">

    <h2>🎯 Your Result</h2>

    <div class="circle">
        <svg>
            <circle class="bg" cx="70" cy="70" r="60"></circle>
            <circle class="progress" cx="70" cy="70" r="60"></circle>
        </svg>
        <div class="percent">{{ percentage }}%</div>
    </div>

    <!-- Rank -->
    <div class="rank">
        {% if percentage >= 90 %}
            🏆 Master
        {% elif percentage >= 75 %}
            🔥 Pro
        {% elif percentage >= 50 %}
            👍 Average
        {% else %}
            🐣 Beginner
        {% endif %}
    </div>

    <div class="score">
        {{ score }} / {{ total }} correct
    </div>

    <!-- Username Show -->
    {% if session.get('username') %}
        <p>👤 {{ session.get('username') }}</p>
    {% endif %}

    <!-- Form -->
    <form method="POST">
        <input type="text" name="name"
               placeholder="Enter your name"
               value="{{ session.get('username', '') }}" required>

        <button type="submit" class="btn">
            {% if session.get('username') %}
                Submit Score 🚀
            {% else %}
                Save & Submit
            {% endif %}
        </button>
    </form>

    <!-- Actions -->
    <a href="/leaderboard">
        <button class="btn btn2">View Leaderboard</button>
    </a>

    <a href="/start">
        <button class="btn">Play Again</button>
    </a>

</div>

</body>
</html>
