<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result | Champion</title>
    <style>
        :root { --p: #6c63ff; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* গ্লাস কার্ড ডিজাইন */
        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 320px; position: relative; z-index: 2;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease;
        }

        /* এনিমেটেড সার্কেল */
        .circle {
            width: 150px; height: 150px; margin: 20px auto; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        svg { width: 150px; height: 150px; transform: rotate(-90deg); }
        circle { 
            fill: none; stroke-width: 10; stroke: rgba(255,255,255,0.1); 
            stroke-dasharray: 440; stroke-linecap: round;
        }
        .bar { 
            stroke: var(--p); stroke-dashoffset: calc(440 - (440 * {{ percentage }}) / 100);
            animation: grow 1.5s ease-out; 
        }

        .score-text { position: absolute; font-size: 32px; font-weight: 800; }
        .badge { background: var(--p); padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: 700; margin: 15px 0; display: inline-block; }
        
        .btn { 
            display: block; background: white; color: black; padding: 15px; 
            border-radius: 12px; text-decoration: none; font-weight: bold; 
            transition: 0.3s; margin-top: 20px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3); }

        @keyframes grow { from { stroke-dashoffset: 440; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 1; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin:0; opacity: 0.8;">Quiz Finished!</h2>
        
        <div class="circle">
            <svg>
                <circle cx="75" cy="75" r="70"></circle>
                <circle cx="75" cy="75" r="70" class="bar"></circle>
            </svg>
            <div class="score-text">{{ percentage }}%</div>
        </div>

        <div class="badge">
            {% if percentage >= 80 %}🐐 THE GOAT
            {% elif percentage >= 50 %}🔥 PRO PLAYER
            {% else %}🐣 BEGINNER
            {% endif %}
        </div>

        <p style="margin: 5px 0; opacity: 0.7;">Correct: {{ score }} / {{ total }}</p>
        <a href="/start" class="btn">Play Again 🚀</a>
    </div>

    <script>
        // কনফেত্তি এনিমেশন (যদি স্কোর ৮০% এর বেশি হয়)
        if ({{ percentage }} >= 80) {
            for(let i=0; i<60; i++) {
                let div = document.createElement('div');
                div.className = 'confetti';
                div.style.left = Math.random()*100 + 'vw';
                div.style.backgroundColor = ['#6c63ff','#ff4757','#00d2d3','#feca57'][Math.floor(Math.random()*4)];
                div.style.top = -20 + 'px';
                div.style.transform = `rotate(${Math.random()*360}deg)`;
                document.body.appendChild(div);
                
                div.animate([
                    { transform: `translate(0, 0) rotate(0)` },
                    { transform: `translate(${Math.random()*100 - 50}px, 105vh) rotate(720deg)` }
                ], { duration: Math.random()*3000 + 2000, easing: 'linear' });
            }
        }
    </script>
</body>
</html>
