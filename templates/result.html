<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<style>
body { font-family: Arial; background:#6c63ff; color:white; padding:30px; }

.card {
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    max-width:600px;
    margin:auto;
}

.correct { color:green; }
.wrong { color:red; }
</style>
</head>

<body>

<div class="card">
    <h2>Your Score: {{ score }} / {{ total }}</h2>
    <h3>{{ percentage }}%</h3>

    <hr>

    <h3>Answer Review</h3>

    {% for a in answers %}
        <p>
            <b>{{ a.question }}</b><br>
            Your Answer: 
            <span class="{{ 'correct' if a.is_correct else 'wrong' }}">
                {{ a.selected }}
            </span><br>
            Correct Answer: {{ a.correct }}
        </p>
        <hr>
    {% endfor %}

    <a href="/"><button>Play Again</button></a>
</div>

</body>
</html>
